<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#ffdde1;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#loginBox{
    text-align:center;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

input{
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

#loveScreen{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.message{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:3rem;
    color:white;
    font-weight:bold;
    z-index:10;
}

.heart{
    position:absolute;
    font-size:2rem;
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="loginBox">
    <h2>❤️ Secret Access ❤️</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <br><br>
    <button onclick="unlock()">Open</button>
</div>

<div id="loveScreen">
    <div class="message">
        I Love You ❤️
    </div>

    <audio id="song" loop>
        <source src="your-song.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
const secretPassword = "forever";

function unlock(){

    const entered = document.getElementById("password").value;

    if(entered === secretPassword){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("loveScreen").style.display="block";

        document.getElementById("song").play();

        createHearts();

    } else {
        alert("Wrong Password ❤️");
    }
}

function createHearts(){

    const emojis = ["❤️","💕","💖","💘","💞","🥰"];

    setInterval(() => {

        const heart = document.createElement("div");

        heart.className = "heart";
        heart.innerHTML =
            emojis[Math.floor(Math.random()*emojis.length)];

        heart.style.left = Math.random()*100 + "vw";
        heart.style.animationDuration =
            (3 + Math.random()*4) + "s";

        document.getElementById("loveScreen")
                .appendChild(heart);

        setTimeout(() => heart.remove(),7000);

    },150);
}
</script>

</body>
</html>
